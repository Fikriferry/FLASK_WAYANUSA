<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Panggung Dalang</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: sans-serif;
            overflow: hidden;
        }

        .panggung {
            position: absolute;
            inset: 0;
            background: url("{{ url_for('static', filename='images/panggung.jpg') }}") center/cover no-repeat;
            filter: brightness(0.85);
            z-index: 1;
        }

        .stage-area {
            position: absolute;
            top: 12vh;
            left: 50%;
            transform: translateX(-50%);
            width: 70vw;
            height: 55vh;
            background: rgba(255, 240, 200, 0.7);
            border: 4px solid #b88a33;
            border-radius: 12px;
            overflow: hidden;
            z-index: 3;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6) inset, 0 0 25px rgba(255, 200, 150, 0.4);
        }

        .tirai-area {
            position: absolute;
            inset: 0;
            background: url("{{ url_for('static', filename='images/tirai2.png') }}") center/cover no-repeat;
            z-index: 10;
            pointer-events: none;
        }

        .btn-add {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 22px;
            border-radius: 10px;
            cursor: pointer;
            color: #000;
            font-weight: bold;
            z-index: 60;
        }

        .wayang-list {
            position: fixed;
            /* ⬅️ ganti dari absolute */
            bottom: 80px;
            /* ⬅️ naikkan dari bawah */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            overflow-x: auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 50;
            /* ⬅️ lebih tinggi dari stage */
        }


        .wayang-list.show {
            opacity: 1;
            pointer-events: auto;
        }

        .wayang-slot {
            width: 80px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #d4a23a;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            cursor: grab;
        }




        .wayang-slot img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .wayang {
            position: absolute;
            width: 90px;
            height: 140px;
            pointer-events: auto;
            cursor: grab;
        }

        .wayang:active {
            cursor: grabbing;
        }

        .trash-bin {
            position: absolute;
            bottom: 8px;
            left: 8px;
            width: 60px;
            height: 60px;
            background: rgba(200, 0, 0, 0.7);
            border: 3px solid #ffaaaa;
            border-radius: 12px;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            pointer-events: auto;
            transition: background 0.3s, transform 0.2s;
            user-select: none;
        }

        .trash-bin.active {
            background: rgba(255, 0, 0, 0.9);
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    {% include 'layouts/navbar.html' %}

    <div class="panggung"></div>

    <div class="stage-area" id="stageArea">
        <div class="tirai-area"></div>
        <div class="trash-bin" id="trashBin">🗑️</div>
    </div>

    <!-- Wayang list -->
    <div class="wayang-list" id="wayangList">
        {% for w in wayangs %}
        <div class="wayang-slot" draggable="true" data-src="{{ url_for('static', filename=w.file_path) }}">
            <img src="{{ url_for('static', filename=w.file_path) }}">
        </div>
        {% endfor %}
    </div>

    <button class="btn-add" id="btnAdd">+</button>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const stage = document.getElementById("stageArea");
            const trash = document.getElementById("trashBin");
            const btnAdd = document.getElementById("btnAdd");
            const wayangList = document.getElementById("wayangList");

            let draggedSrc = null;
            let isFromList = false;

            // =====================
            // TOMBOL +
            // =====================
            btnAdd.onclick = () => {
                wayangList.classList.toggle("show");
            };


            // =====================
            // DRAG DARI LIST
            // =====================
            document.querySelectorAll(".wayang-slot").forEach(slot => {
                slot.addEventListener("dragstart", () => {
                    draggedSrc = slot.dataset.src;
                    isFromList = true;
                });
            });

            stage.addEventListener("dragover", e => e.preventDefault());

            stage.addEventListener("drop", e => {
                e.preventDefault();
                if (!isFromList || !draggedSrc) return;

                const rect = stage.getBoundingClientRect();
                const img = document.createElement("img");

                img.src = draggedSrc;
                img.className = "wayang";
                img.draggable = false;

                img.style.left = (e.clientX - rect.left - 45) + "px";
                img.style.top = (e.clientY - rect.top - 70) + "px";

                stage.appendChild(img);
                enableStageDrag(img);
                fallDown(img);

                draggedSrc = null;
                isFromList = false;
            });

            // =====================
            // DRAG DI STAGE
            // =====================
            function enableStageDrag(el) {
                let isDrag = false, offsetX = 0, offsetY = 0;

                el.addEventListener("mousedown", e => {
                    isDrag = true;
                    offsetX = e.offsetX;
                    offsetY = e.offsetY;
                    el.falling = false;

                    document.addEventListener("mousemove", move);
                    document.addEventListener("mouseup", up);
                });

                function move(e) {
                    if (!isDrag) return;
                    const r = stage.getBoundingClientRect();

                    let x = e.clientX - r.left - offsetX;
                    let y = e.clientY - r.top - offsetY;

                    x = Math.max(0, Math.min(r.width - el.clientWidth, x));
                    y = Math.max(0, Math.min(r.height - el.clientHeight, y));

                    el.style.left = x + "px";
                    el.style.top = y + "px";

                    trash.classList.toggle("active", isOverTrash(el));
                }

                function up() {
                    isDrag = false;
                    if (isOverTrash(el)) el.remove();
                    else fallDown(el);

                    trash.classList.remove("active");
                    document.removeEventListener("mousemove", move);
                    document.removeEventListener("mouseup", up);
                }
            }

            function isOverTrash(el) {
                const w = el.getBoundingClientRect();
                const t = trash.getBoundingClientRect();
                return !(w.right < t.left || w.left > t.right ||
                    w.bottom < t.top || w.top > t.bottom);
            }

            function fallDown(el) {
                if (el.falling) return;
                el.falling = true;

                const rect = stage.getBoundingClientRect();
                const bottom = rect.height - el.clientHeight;
                let y = parseInt(el.style.top) || 0;

                const fall = setInterval(() => {
                    y += 4;
                    if (y >= bottom) {
                        y = bottom;
                        clearInterval(fall);
                        el.falling = false;
                    }
                    el.style.top = y + "px";
                }, 10);
            }
        });
    </script>


</body>

</html>
